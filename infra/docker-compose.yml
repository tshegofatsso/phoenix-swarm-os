version: "3"

services:
  backend:
    build: ../backend
    ports: ["8000:8000"]
    environment:
      AUTH_TOKEN: ${AUTH_TOKEN:-dev-token}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  frontend:
    build:
      context: ../frontend
      dockerfile: ../frontend/Dockerfile
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_WS_URL: ws://backend:8000/ws
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_AUTH_TOKEN: ${AUTH_TOKEN:-dev-token}

  redis:
    image: redis:alpine
    ports: ["6379:6379"]